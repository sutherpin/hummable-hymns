<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=index.html">
<title>Redirecting… - Hummable Hymns</title>
<script>
  // playlist.html used to be its own page. The app is now a single-page
  // shell (index.html) so the player can keep playing across navigation.
  // This shim preserves old/shared links by forwarding the query string
  // (e.g. playlist.html?category=hymns) straight to the SPA shell.
  window.location.replace("index.html" + window.location.search);
</script>
</head>
<body>
  <p>Redirecting to <a href="index.html">Hummable Hymns</a>&hellip;</p>
</body>
</html>
