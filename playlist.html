<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Playlist - Hummable Hymns</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header playlist-header">
    <a href="index.html" class="back-link">&larr; Categories</a>
    <h1 id="category-title">Playlist</h1>
  </header>

  <main>
    <ul class="song-list" id="song-list">
      <!-- Songs rendered here by js/app.js -->
    </ul>
  </main>

  <div class="player-bar" id="player-bar">
    <div class="lyrics-panel" id="lyrics-panel">
      <div class="lyrics-panel-header">
        <span>Lyrics</span>
      </div>
      <div class="lyrics-panel-body" id="lyrics-panel-body">
        <!-- Lyrics text injected here by player.js -->
      </div>
    </div>
    <div class="player-info">
      <p id="now-playing-title">Select a song</p>
    </div>
    <div class="player-progress">
      <span id="current-time">0:00</span>
      <input type="range" id="seek-bar" value="0" min="0" max="100" step="0.1">
      <span id="duration-time">0:00</span>
    </div>
    <div class="player-controls">
      <button id="prev-btn" aria-label="Previous">&#9664;&#9664;</button>
      <button id="play-pause-btn" aria-label="Play">&#9654;</button>
      <button id="next-btn" aria-label="Next">&#9654;&#9654;</button>
      <button id="lyrics-btn" aria-label="Show lyrics" class="lyrics-btn" disabled>&#9660; Lyrics</button>
      <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1" aria-label="Volume">
    </div>
    <audio id="audio-player" preload="none"></audio>
  </div>

  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
